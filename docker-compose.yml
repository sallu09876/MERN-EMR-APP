version: "3.9"

services:
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: emr-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - NODE_ENV=production
      - CLIENT_ORIGIN=http://localhost:3000
    depends_on:
      - mongo
    restart: unless-stopped

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: emr-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: emr-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
