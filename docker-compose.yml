version: "3.9"

services:
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: emr-server
    ports:
      - "5000:5000"
    environment:
      # Server
      - PORT=5000
      - NODE_ENV=production
      - CLIENT_ORIGIN=http://localhost:3000

      # Database
      - MONGO_URI=${MONGO_URI}

      # JWT
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_RESET_SECRET=${JWT_RESET_SECRET}

      # Email (Nodemailer)
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}

      # Razorpay
      - RAZORPAY_MODE=${RAZORPAY_MODE}
      - RAZORPAY_KEY_ID_TEST=${RAZORPAY_KEY_ID_TEST}
      - RAZORPAY_KEY_SECRET_TEST=${RAZORPAY_KEY_SECRET_TEST}

      # Cloudinary (if image upload is active)
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

    depends_on:
      - mongo
    restart: unless-stopped

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: emr-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: emr-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: